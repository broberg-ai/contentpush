# F006.1: blokerende secret-gate + verify. secret-scan kører på hvert push;
# verify (typecheck + build) AFHÆNGER af scannen, så en rød scan blokerer hele
# CI-signalet (og dermed merge/deploy-stien). Ingen --no-verify-bypass.
name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: Secret scan (blocking gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Scan tracked files for secrets
        working-directory: apps/web
        run: bun run scripts/secret-scan.ts

  verify:
    name: Typecheck + build
    runs-on: ubuntu-latest
    needs: secret-scan # rød scan → verify kører aldrig → CI rød → merge/deploy blokeret
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/web
        run: bunx tsc --noEmit
      - name: Build SPA
        working-directory: apps/web
        run: bunx vite build
